<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 파일 분석기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 폰트 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        /* 로딩 스피너 애니메이션 */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 파일 입력 필드 숨기기 */
        #fileInput {
            display: none;
        }

        /* 분석 결과 가독성을 위한 커스텀 스타일 */
        #analysisOutput {
            color: #1f2937; /* 기본 텍스트 색상 (어두운 회색) */
        }
        .dark #analysisOutput {
            color: #d1d5db; /* 다크 모드 텍스트 색상 (밝은 회색) */
        }

        #analysisOutput h1, #analysisOutput h2, #analysisOutput h3 {
            font-weight: 700;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        #analysisOutput h1 { font-size: 1.875rem; }
        #analysisOutput h2 { font-size: 1.5rem; }
        #analysisOutput h3 { font-size: 1.25rem; }

        #analysisOutput p {
            line-height: 1.75;
            margin-bottom: 1.25em;
        }

        #analysisOutput ul, #analysisOutput ol {
            padding-left: 1.5em;
            margin-bottom: 1.25em;
        }
        #analysisOutput ul { list-style-type: disc; }
        #analysisOutput ol { list-style-type: decimal; }
        #analysisOutput li { margin-bottom: 0.5em; }

        #analysisOutput a {
            color: #2563eb; /* blue-600 */
            text-decoration: underline;
        }
        .dark #analysisOutput a { color: #60a5fa; /* blue-400 */ }

        #analysisOutput strong, #analysisOutput b {
            font-weight: 600;
            color: #000000;
        }
        .dark #analysisOutput strong, .dark #analysisOutput b {
            color: #ffffff;
        }

        #analysisOutput code {
            background-color: #e5e7eb;
            color: #111827;
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            border-radius: 3px;
        }
        .dark #analysisOutput code { 
            background-color: #374151;
            color: #e5e7eb;
        }

        #analysisOutput pre {
            background-color: #f3f4f6;
            padding: 1em;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1.5em;
        }
        .dark #analysisOutput pre { background-color: #1f2937; }
        .dark #analysisOutput pre code {
             background-color: transparent;
        }

        #analysisOutput blockquote {
            border-left: 4px solid #d1d5db;
            padding-left: 1em;
            font-style: italic;
            color: #6b7280;
            margin-bottom: 1.5em;
        }
        .dark #analysisOutput blockquote {
            border-left-color: #4b5563;
            color: #9ca3af;
        }

        /* --- 테이블 가독성 최종 수정 --- */
        #analysisOutput table {
            width: 100%;
            margin-bottom: 1.5em;
            border-collapse: collapse;
        }
        #analysisOutput th, #analysisOutput td {
            border: 1px solid #d1d5db;
            padding: 0.75em 1em; /* 패딩 조정 */
            color: #1f2937; /* 라이트 모드 테이블 텍스트 색상 */
        }
        .dark #analysisOutput th, .dark #analysisOutput td { 
            border-color: #4b5563;
            color: #d1d5db; /* 다크 모드 테이블 텍스트 색상 */
        }
        #analysisOutput th { 
            background-color: #f9fafb;
            font-weight: 600;
        }
        .dark #analysisOutput th { 
            background-color: #374151;
        }
        /* 다크 모드 테이블 내부 링크 색상 조정 */
        .dark #analysisOutput td a {
            color: #93c5fd; /* 더 밝은 파란색으로 가독성 확보 */
        }
        /* --- /테이블 가독성 최종 수정 --- */
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-500">
    <div class="container mx-auto p-4 sm:p-6 md:p-8">
        
        <div class="w-full max-w-4xl mx-auto text-center mb-10">
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-gray-800 dark:text-white mb-3">
                AI 파일 분석기
            </h1>
            <p class="text-lg text-gray-600 dark:text-gray-400">
                TXT 또는 JSON 파일을 업로드하고, Gemini에게 분석을 요청해보세요.
            </p>
        </div>

        <div class="w-full max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 sm:p-8">
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-200 mb-3">1. 파일 첨부하기</h2>
                <label for="fileInput" class="w-full flex items-center justify-center px-6 py-8 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <div class="text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
                        <p class="mt-2 text-sm text-gray-600 dark:text-gray-400"><span class="font-semibold text-blue-600 dark:text-blue-400">클릭하여 파일을 선택</span>하거나 파일을 여기로 드래그하세요.</p>
                        <p class="text-xs text-gray-500 dark:text-gray-500">TXT 또는 JSON 파일만 가능</p>
                        <p id="fileName" class="mt-2 text-sm font-medium text-gray-800 dark:text-gray-200"></p>
                    </div>
                </label>
                <input type="file" id="fileInput" accept=".txt,.json">
            </div>

            <div class="mb-6">
                <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-200 mb-3">2. 분석 내용 요청하기</h2>
                <textarea id="promptInput" rows="4" class="w-full p-4 text-base bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-200 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition" placeholder="예: 이 문서의 내용을 요약해줘. 또는 아래 예시를 클릭해보세요."></textarea>
            </div>
            
            <div class="mb-8">
                <h3 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-3">원클릭 분석 요청 예시 🚀</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">아래 예시를 클릭하면 분석 요청 내용이 자동으로 입력됩니다. 데이터에 맞게 자유롭게 수정해서 사용하세요.</p>
                <div id="examplePrompts" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="text-center">
                <button id="analyzeButton" class="px-10 py-4 text-lg font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 dark:focus:ring-offset-gray-800 transition-transform transform hover:scale-105 disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                    분석 시작하기
                </button>
            </div>
        </div>

        <div id="resultWrapper" class="w-full max-w-4xl mx-auto mt-10">
            <div id="loadingIndicator" class="hidden flex-col items-center justify-center p-8">
                <div class="loader mb-4"></div>
                <p class="text-lg text-gray-600 dark:text-gray-400">Gemini가 파일을 분석하고 있습니다. 잠시만 기다려주세요...</p>
            </div>

            <div id="errorMessage" class="hidden p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50 dark:bg-gray-800 dark:text-red-400" role="alert">
                <span class="font-medium">오류 발생!</span> <span id="errorMessageText"></span>
            </div>

            <div id="resultContainer" class="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg max-w-none transition-opacity duration-500 opacity-0">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 border-b border-gray-300 dark:border-gray-600 pb-2 mb-4">분석 결과</h2>
                <div id="analysisOutput"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // DOM 요소 가져오기
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const promptInput = document.getElementById('promptInput');
        const analyzeButton = document.getElementById('analyzeButton');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const resultWrapper = document.getElementById('resultWrapper');
        const resultContainer = document.getElementById('resultContainer');
        const analysisOutput = document.getElementById('analysisOutput');
        const errorMessage = document.getElementById('errorMessage');
        const errorMessageText = document.getElementById('errorMessageText');
        const examplePromptsContainer = document.getElementById('examplePrompts');

        let fileContent = '';
        let currentFileName = '';
        let isAutoLoaded = false;

        const examplePrompts = [
            "조회수가 가장 높은 상위 5개 영상을 찾아서 제목, 조회수, 채널명을 표로 정리해줘", "바이럴 점수(viralityScore)가 높은 순으로 상위 10개 영상의 특징을 분석해줘", "구독자 대비 조회수 성과가 가장 좋은 채널 5개를 찾아서 분석해줘", "제목에 ‘드라마’가 포함된 영상들의 조회수와 참여율을 분석해줘", "1분 이하 숏츠와 긴 영상의 조회수 및 참여율 차이를 비교해줘", "최근 7일 이내 업로드된 영상들의 성과를 분석해줘", "좋아요율(likeRate)이 가장 높은 영상 10개의 공통점을 찾아줘", "채널 성장 잠재력(subscriberGrowthPotential)이 높은 순으로 상위 5개 채널을 분석해줘", "카테고리ID별로 영상 성과의 평균을 계산해서 비교해줘", "커스텀 썸네일 사용 여부에 따른 조회수 차이를 분석해줘"
        ];

        // 페이지 로드시 자동으로 YouTube 데이터 체크
        window.addEventListener('DOMContentLoaded', function() {
            loadYouTubeDataFromLocalStorage();
        });

        function loadYouTubeDataFromLocalStorage() {
            try {
                // localStorage에서 YouTube 검색 결과 찾기
                const youtubeData = localStorage.getItem('youtubeSearchResults') || 
                                  localStorage.getItem('youtube_search_data') ||
                                  localStorage.getItem('searchResults');
                
                if (youtubeData) {
                    const parsedData = JSON.parse(youtubeData);
                    if (parsedData && (Array.isArray(parsedData) || parsedData.videos || parsedData.items)) {
                        // 데이터 자동 로드 성공
                        fileContent = typeof parsedData === 'string' ? parsedData : JSON.stringify(parsedData, null, 2);
                        currentFileName = 'YouTube 검색 데이터 (자동 로드됨)';
                        isAutoLoaded = true;
                        
                        // UI 업데이트
                        fileNameDisplay.textContent = `✅ ${currentFileName}`;
                        fileNameDisplay.className = 'mt-2 text-sm font-medium text-green-600 dark:text-green-400';
                        
                        // 성공 메시지 표시
                        showAutoLoadSuccess();
                        checkIfReadyToAnalyze();
                        
                        console.log('YouTube 데이터 자동 로드 성공:', parsedData.length || Object.keys(parsedData).length, '개 항목');
                        return;
                    }
                }
                
                // 데이터가 없는 경우
                showAutoLoadMessage();
                
            } catch (error) {
                console.error('localStorage 데이터 로드 실패:', error);
                showAutoLoadMessage();
            }
        }

        function showAutoLoadSuccess() {
            const message = document.createElement('div');
            message.className = 'p-3 mb-4 text-sm text-green-800 rounded-lg bg-green-50 dark:bg-gray-800 dark:text-green-400';
            message.innerHTML = '<span class="font-medium">자동 로드 완료!</span> YouTube 검색 데이터가 준비되었습니다. 바로 분석을 시작할 수 있습니다.';
            
            const container = document.querySelector('.w-full.max-w-4xl.mx-auto.bg-white');
            container.insertBefore(message, container.firstChild);
            
            // 3초 후 메시지 제거
            setTimeout(() => {
                if (message.parentNode) {
                    message.remove();
                }
            }, 3000);
        }

        function showAutoLoadMessage() {
            fileNameDisplay.textContent = '❌ YouTube 검색 데이터를 찾을 수 없습니다';
            fileNameDisplay.className = 'mt-2 text-sm font-medium text-orange-600 dark:text-orange-400';
            
            const message = document.createElement('div');
            message.className = 'p-3 mb-4 text-sm text-orange-800 rounded-lg bg-orange-50 dark:bg-gray-800 dark:text-orange-400';
            message.innerHTML = '<span class="font-medium">알림</span> YouTube 프로젝트에서 검색을 먼저 실행하신 후 다시 페이지를 열어주세요. 또는 파일을 직접 업로드하실 수 있습니다.';
            
            const container = document.querySelector('.w-full.max-w-4xl.mx-auto.bg-white');
            container.insertBefore(message, container.firstChild);
        }

        examplePrompts.forEach(promptText => {
            const button = document.createElement('button');
            button.textContent = promptText;
            button.className = 'px-3 py-1.5 text-sm bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-full hover:bg-blue-200 dark:hover:bg-blue-500 transition-colors cursor-pointer';
            button.type = 'button';
            button.addEventListener('click', () => {
                promptInput.value = promptText;
                promptInput.focus();
                checkIfReadyToAnalyze();
            });
            examplePromptsContainer.appendChild(button);
        });

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                if (!file.type.includes('text/plain') && !file.type.includes('application/json')) {
                    showError('TXT 또는 JSON 파일만 업로드할 수 있습니다.');
                    fileInput.value = '';
                    fileNameDisplay.textContent = '';
                    analyzeButton.disabled = true;
                    return;
                }
                hideError();
                currentFileName = file.name;
                isAutoLoaded = false; // 수동 업로드로 변경
                fileNameDisplay.textContent = `선택된 파일: ${currentFileName}`;
                fileNameDisplay.className = 'mt-2 text-sm font-medium text-gray-800 dark:text-gray-200';
                
                // 기존 자동 로드 메시지 제거
                const existingMessages = document.querySelectorAll('.bg-green-50, .bg-orange-50');
                existingMessages.forEach(msg => msg.remove());
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    fileContent = e.target.result;
                    checkIfReadyToAnalyze();
                };
                reader.onerror = () => {
                    showError('파일을 읽는 중 오류가 발생했습니다.');
                    analyzeButton.disabled = true;
                };
                reader.readAsText(file);
            }
        });
        
        promptInput.addEventListener('input', checkIfReadyToAnalyze);

        function checkIfReadyToAnalyze() {
            analyzeButton.disabled = !(fileContent && promptInput.value.trim());
        }

        analyzeButton.addEventListener('click', analyzeFile);

        async function analyzeFile() {
            const userPrompt = promptInput.value.trim();
            if (!fileContent || !userPrompt) {
                showError('파일과 분석 요청 내용을 모두 입력해주세요.');
                return;
            }
            hideError();
            resultContainer.classList.add('opacity-0');
            analysisOutput.innerHTML = '';
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            analyzeButton.disabled = true;

            try {
                const dataSource = isAutoLoaded ? '프로젝트에서 자동 로드된' : '사용자가 업로드한';
                const fullPrompt = `
다음은 ${dataSource} '${currentFileName}' 파일의 내용입니다.
--- 파일 내용 시작 ---
\`\`\`
${fileContent}
\`\`\`
--- 파일 내용 끝 ---
이 파일 내용을 바탕으로 다음 요청을 상세하게 분석하고 설명해주세요:
요청: "${userPrompt}"`;
                
                let chatHistory = [{ role: "user", parts: [{ text: fullPrompt }] }];
                const payload = { contents: chatHistory };
                const apiKey = "";
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API 요청 실패: ${response.status} - ${errorData.error?.message || 'Unknown error'}`);
                }

                const result = await response.json();

                if (result.candidates && result.candidates.length > 0) {
                    const rawText = result.candidates[0].content.parts[0].text;
                    const htmlContent = marked.parse(rawText);
                    displayResult(htmlContent);
                } else {
                    console.error("Unexpected API response structure:", result);
                    displayResult('<p>분석 결과를 받지 못했습니다. 프롬프트를 수정하여 다시 시도해보세요.</p>');
                }

            } catch (error) {
                console.error('Gemini API 호출 중 에러:', error);
                showError(`분석 중 문제가 발생했습니다: ${error.message}`);
            } finally {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                checkIfReadyToAnalyze();
            }
        }

        function displayResult(content) {
            analysisOutput.innerHTML = content;
            resultContainer.classList.remove('opacity-0');
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function showError(message) {
            errorMessageText.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }
    </script>
</body>
</html>
